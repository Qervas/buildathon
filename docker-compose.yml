version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: buildathon_db
    restart: always
    environment:
      POSTGRES_USER: buildathon
      POSTGRES_PASSWORD: buildathon_password
      POSTGRES_DB: buildathon
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
